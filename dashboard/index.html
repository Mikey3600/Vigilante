<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigilante Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 py-4 px-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
            Vigilante
        </h1>
        <div id="auth-status" class="text-sm font-mono text-gray-400">
            Not Authenticated
        </div>
    </header>

    <!-- Login Form -->
    <div id="login-modal" class="fixed inset-0 bg-gray-900 bg-opacity-90 flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-gray-800 p-8 rounded-lg shadow-2xl border border-gray-700 w-full max-w-md">
            <h2 class="text-xl font-semibold mb-6 text-center">Tenant Access</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm mb-2" for="token">JWT Bearer Token</label>
                    <input class="w-full bg-gray-900 border border-gray-600 rounded py-2 px-3 text-gray-200 focus:outline-none focus:border-blue-500 font-mono" id="token" type="password" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded transition-colors">
                    Connect
                </button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard -->
    <main class="flex-grow p-6 grid grid-cols-1 lg:grid-cols-3 gap-6 max-w-7xl mx-auto w-full">
        
        <!-- Metrics Chart -->
        <section class="lg:col-span-2 bg-gray-800 rounded-lg p-5 border border-gray-700 shadow-sm flex flex-col">
            <h3 class="text-lg font-medium text-gray-300 mb-4 border-b border-gray-700 pb-2">Live Metrics</h3>
            <div class="flex-grow relative h-64">
                <canvas id="metricsChart"></canvas>
            </div>
        </section>

        <!-- Anomaly Feed -->
        <section class="bg-gray-800 rounded-lg p-5 border border-gray-700 shadow-sm flex flex-col h-full max-h-[400px] lg:max-h-full">
            <h3 class="text-lg font-medium text-red-400 mb-4 border-b border-gray-700 pb-2 flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                AI Incident Intelligence
            </h3>
            <div id="anomaly-feed" class="flex-grow overflow-y-auto space-y-4 pr-2 custom-scrollbar">
                <!-- Fallback text -->
                <p class="text-gray-500 text-sm italic text-center mt-10">No recent anomalies detected.</p>
            </div>
        </section>

        <!-- Log Stream -->
        <section class="lg:col-span-3 bg-gray-800 rounded-lg p-5 border border-gray-700 shadow-sm flex flex-col h-96">
            <h3 class="text-lg font-medium text-gray-300 mb-4 border-b border-gray-700 pb-2">Live Logs</h3>
            <div id="log-stream" class="flex-grow overflow-y-auto bg-gray-900 rounded p-4 font-mono text-sm space-y-1 custom-scrollbar">
                <div class="text-gray-500">Waiting for logs...</div>
            </div>
        </section>

    </main>

    <script>
        const API_BASE = 'http://localhost:8080';
        const SERVICE_ID = 'default';

        // Authentication state
        let jwtToken = localStorage.getItem('jwtToken') || '';
        let metricsIntervalId = null;
        let logsIntervalId = null;
        let anomaliesIntervalId = null;

        // DOM Elements
        const loginModal = document.getElementById('login-modal');
        const loginForm = document.getElementById('login-form');
        const tokenInput = document.getElementById('token');
        const authStatus = document.getElementById('auth-status');
        const anomalyFeed = document.getElementById('anomaly-feed');
        const logStream = document.getElementById('log-stream');

        // Chart Initialization
        const ctx = document.getElementById('metricsChart').getContext('2d');
        const metricsChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Service Latency (ms)',
                    data: [],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { ticks: { color: '#9ca3af' }, grid: { color: '#374151' } },
                    y: { ticks: { color: '#9ca3af' }, grid: { color: '#374151' } }
                },
                plugins: {
                    legend: { labels: { color: '#9ca3af' } }
                }
            }
        });

        function setAuthenticatedUI() {
            loginModal.style.display = 'none';
            authStatus.textContent = 'Authenticated :: Live';
            authStatus.classList.remove('text-gray-400');
            authStatus.classList.add('text-green-400');
        }

        function setUnauthenticatedUI(message = 'Not Authenticated') {
            authStatus.textContent = message;
            authStatus.classList.remove('text-green-400');
            authStatus.classList.add('text-gray-400');
            loginModal.style.display = 'flex';
        }

        function handleSessionExpired() {
            jwtToken = '';
            localStorage.removeItem('jwtToken');
            stopPolling();
            setUnauthenticatedUI('Session expired');
        }

        async function authorizedFetch(path) {
            const response = await fetch(`${API_BASE}${path}`, {
                headers: {
                    Authorization: `Bearer ${jwtToken}`
                }
            });

            if (response.status === 401) {
                handleSessionExpired();
                return null;
            }

            if (!response.ok) {
                throw new Error(`Request failed (${response.status}) for ${path}`);
            }

            return response.json();
        }

        function asArray(payload) {
            if (Array.isArray(payload)) return payload;
            if (payload && Array.isArray(payload.data)) return payload.data;
            if (payload && Array.isArray(payload.items)) return payload.items;
            return [];
        }

        function renderNoData(container, text = 'No data yet') {
            container.innerHTML = `<div class="text-gray-500 text-sm italic text-center mt-2">${text}</div>`;
        }

        function renderError(container, text) {
            container.innerHTML = `<div class="text-red-400 text-sm italic text-center mt-2">${text}</div>`;
        }

        function updateMetrics(metrics) {
            if (metrics.length === 0) {
                metricsChart.data.labels = ['No data yet'];
                metricsChart.data.datasets[0].data = [0];
                metricsChart.update();
                return;
            }
            const ordered = [...metrics].reverse();
            metricsChart.data.labels = ordered.map((entry, idx) => {
                const ts = entry.timestamp || entry.ts || entry.time || entry.created_at;
                return ts ? new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : `#${idx + 1}`;
            });
            metricsChart.data.datasets[0].data = ordered.map((entry) => {
                const value = Number(entry.latency_ms ?? entry.latency ?? entry.value ?? entry.metric_value ?? 0);
                return Number.isFinite(value) ? value : 0;
            });
            metricsChart.update();
        }

        function updateLogs(logs) {
            if (logs.length === 0) {
                renderNoData(logStream);
                return;
            }
            logStream.innerHTML = '';
            logs.slice().reverse().forEach((log) => {
                const el = document.createElement('div');
                const rawTs = log.timestamp || log.ts || log.time || log.created_at;
                const time = rawTs ? new Date(rawTs).toISOString().split('T')[1].replace('Z', '') : 'unknown';
                const level = String(log.level || 'INFO').toUpperCase();
                const msg = log.message || log.msg || JSON.stringify(log);

                let color = 'text-gray-300';
                if (level === 'ERROR') color = 'text-red-400';
                if (level === 'WARN' || level === 'WARNING') color = 'text-yellow-400';

                el.innerHTML = `<span class="text-gray-500">[${time}]</span> <span class="font-bold ${color}">${level}</span> ${msg}`;
                logStream.appendChild(el);
            });
            logStream.scrollTop = logStream.scrollHeight;
        }

        function updateAnomalies(anomalies) {
            if (anomalies.length === 0) {
                renderNoData(anomalyFeed);
                return;
            }
            anomalyFeed.innerHTML = '';
            anomalies.forEach((data) => {
                const el = document.createElement('div');
                el.className = 'bg-gray-900 rounded p-4 border-l-4 border-red-500 flex flex-col gap-2 relative shadow-md animate-fade-in-up';
                const ts = data.timestamp || data.ts || data.time || data.created_at;
                const title = data.title || data.name || data.anomaly_type || 'Detected anomaly';
                const summary = data.summary || data.description || data.root_cause_summary || 'No summary provided.';
                const likelyCause = data.likelyCause || data.cause || data.likely_cause || 'Unknown';
                const fix = data.fix || data.remediation || data.suggested_fix || 'No remediation provided.';

                el.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="font-semibold text-red-400 text-sm">${title}</span>
                        <span class="text-xs text-gray-500">${ts ? new Date(ts).toLocaleTimeString() : ''}</span>
                    </div>
                    <div class="text-sm text-gray-300 mt-1"><span class="font-medium text-gray-400">AI Summary:</span> ${summary}</div>
                    <div class="text-sm text-gray-300"><span class="font-medium text-gray-400">Cause:</span> ${likelyCause}</div>
                    <div class="text-sm text-green-400 mt-2 p-2 bg-gray-800 rounded border border-green-900"><span class="font-bold">Fix:</span> ${fix}</div>
                `;
                anomalyFeed.appendChild(el);
            });
        }

        async function fetchDashboard() {
            const payload = await authorizedFetch(`/api/v1/dashboard?service_id=${SERVICE_ID}`);
            if (!payload) return;
            updateMetrics(asArray(payload.metrics));
            updateLogs(asArray(payload.logs));
            updateAnomalies(asArray(payload.anomalies));
        }

        function stopPolling() {
            [metricsIntervalId, logsIntervalId, anomaliesIntervalId].forEach((id) => {
                if (id) clearInterval(id);
            });
            metricsIntervalId = null;
            logsIntervalId = null;
            anomaliesIntervalId = null;
        }

        function handlePollingError(err) {
            stopPolling();
            authStatus.textContent = 'Backend offline';
            authStatus.classList.remove('text-green-400');
            authStatus.classList.add('text-red-400');
            metricsChart.data.labels = ['Connection lost'];
            metricsChart.data.datasets[0].data = [0];
            metricsChart.update();
            renderError(logStream, 'Backend unavailable. Polling stopped.');
            renderError(anomalyFeed, 'Backend unavailable. Polling stopped.');
            console.error(err);
        }

        function startPolling() {
            stopPolling();
            fetchDashboard().catch(handlePollingError);
            metricsIntervalId = setInterval(() => fetchDashboard().catch(handlePollingError), 3000);
        }

        // Handle Login
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const token = tokenInput.value.trim();
            if (!token) return;

            jwtToken = token;
            localStorage.setItem('jwtToken', jwtToken);
            tokenInput.value = '';
            setAuthenticatedUI();
            startPolling();
        });

        // Auto-connect when token exists in localStorage
        if (jwtToken) {
            setAuthenticatedUI();
            startPolling();
        }
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
</html>
